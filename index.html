    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #FAF8F2;
      color: #1A1A2E;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    .brand {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #C8A84B;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .game-title {
      font-family: 'Righteous', cursive;
      font-size: 28px;
      color: #1A1A2E;
      text-align: center;
      margin-bottom: 0.35rem;
      letter-spacing: 1px;
    }

    .game-sub {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 2rem;
    }

    .game-wrap {
      width: 100%;
      max-width: 680px;
    }

    .questions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .q-btn {
      border: 1.5px solid #ddd;
      border-radius: 14px;
      padding: 14px 10px;
      cursor: pointer;
      background: #fff;
      transition: transform 0.12s, border-color 0.15s, background 0.15s;
      text-align: center;
    }

    .q-btn:hover { border-color: #aaa; transform: translateY(-2px); }
    .q-btn:active { transform: scale(0.97); }

    .q-btn .q-label {
      font-size: 10px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .q-btn .q-turkish {
      font-family: 'Righteous', cursive;
      font-size: 16px;
      color: #1A1A2E;
    }

    .q-btn[data-cat="kim"]       { --accent: #185FA5; --accent-bg: #E6F1FB; }
    .q-btn[data-cat="kiminle"]   { --accent: #0F6E56; --accent-bg: #E1F5EE; }
    .q-btn[data-cat="nerede"]    { --accent: #993C1D; --accent-bg: #FAECE7; }
    .q-btn[data-cat="nezaman"]   { --accent: #854F0B; --accent-bg: #FAEEDA; }
    .q-btn[data-cat="neyapiyor"] { --accent: #993556; --accent-bg: #FBEAF0; }

    .q-btn.active {
      background: var(--accent-bg);
      border-color: var(--accent);
      border-width: 2px;
    }
    .q-btn.active .q-turkish { color: var(--accent); }

    .result-area {
      min-height: 110px;
      border-radius: 14px;
      border: 1.5px solid #e0ddd4;
      background: #fff;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    .result-placeholder {
      color: #bbb;
      font-size: 14px;
      text-align: center;
      margin: auto;
      line-height: 1.7;
    }

    .result-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }

    .chip-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
    }

    .chip {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 700;
      display: inline-block;
    }

    .chip-tr {
      color: #999;
      font-size: 11px;
      padding: 0 4px;
    }

    .chip[data-cat="kim"]       { background: #E6F1FB; color: #185FA5; }
    .chip[data-cat="kiminle"]   { background: #E1F5EE; color: #0F6E56; }
    .chip[data-cat="nerede"]    { background: #FAECE7; color: #993C1D; }
    .chip[data-cat="nezaman"]   { background: #FAEEDA; color: #854F0B; }
    .chip[data-cat="neyapiyor"] { background: #FBEAF0; color: #993556; }

    .sep { color: #ccc; font-size: 20px; align-self: flex-start; padding-top: 5px; }

    .sentence-area {
      font-size: 16px;
      font-weight: 700;
      color: #1A1A2E;
      line-height: 1.7;
      padding-top: 10px;
      border-top: 1px solid #eee;
      display: none;
    }

    .sentence-en {
      font-size: 13px;
      font-weight: 400;
      color: #888;
      margin-top: 4px;
      line-height: 2;
    }

    .sc-kim       { color: #185FA5; font-weight: 700; }
    .sc-kiminle   { color: #0F6E56; font-weight: 700; }
    .sc-nerede    { color: #993C1D; font-weight: 700; }
    .sc-nezaman   { color: #854F0B; font-weight: 700; }
    .sc-neyapiyor { color: #993556; font-weight: 700; }

    .se-kim       { background: #E6F1FB; color: #185FA5; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 700; display: inline-block; }
    .se-kiminle   { background: #E1F5EE; color: #0F6E56; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 700; display: inline-block; }
    .se-nerede    { background: #FAECE7; color: #993C1D; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 700; display: inline-block; }
    .se-nezaman   { background: #FAEEDA; color: #854F0B; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 700; display: inline-block; }
    .se-neyapiyor { background: #FBEAF0; color: #993556; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 700; display: inline-block; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      flex: 1;
      min-width: 120px;
      padding: 13px 18px;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid #ddd;
      background: #fff;
      color: #1A1A2E;
      transition: transform 0.1s, background 0.1s;
    }

    .action-btn:hover { background: #f5f2ea; }
    .action-btn:active { transform: scale(0.97); }

    .action-btn.primary {
      background: #1A1A2E;
      color: #FAF8F2;
      border-color: #1A1A2E;
    }
    .action-btn.primary:hover { opacity: 0.85; }

    .footer {
      margin-top: 2.5rem;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }

    .footer a { color: #C8A84B; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .spin-anim { animation: popIn 0.32s cubic-bezier(0.34, 1.56, 0.64, 1); }

    @media (max-width: 480px) {
      .result-chips { gap: 6px; }
      .chip-wrap { flex-direction: row; align-items: center; gap: 6px; }
      .chip { font-size: 12px; padding: 4px 10px; }
      .chip-tr { font-size: 10px; }
      .sep { display: none; }
      .sentence-area { font-size: 14px; }
      .sentence-en { font-size: 11px; }
      .q-btn { padding: 10px 8px; }
      .q-btn .q-turkish { font-size: 14px; }
      .questions-grid { gap: 8px; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
      .result-area { min-height: 80px; padding: 1rem; }
    }
  </style>

    </div>

    <div class="result-area" id="resultArea">
      <div class="result-placeholder" id="placeholder">Bir soruya tıklayarak başla!</div>
      <div class="result-chips" id="chips" style="display:none;"></div>
      <div class="sentence-area" id="sentence"></div>
    </div>

    <div class="actions">
      <button class="action-btn" onclick="drawAll()">Hepsini Cevapla<br><span style="font-size:11px;color:#aaa;font-weight:400;">Answer All</span></button>

    </div>
  </div>

  <div class="footer">
    A free game by <a href="https://turkish.academy" target="_blank">Turkish Academy</a>
  </div>

const state = { kim: null, kiminle: null, nerede: null, nezaman: null, neyapiyor: null };

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function draw(cat) {
  if (state[cat] !== null) return;
  if (cat === 'kiminle') {
    const p = pick(pools.kim);
    state[cat] = { tr: p.tr + ' ile', en: 'with ' + p.en };
  } else {
    state[cat] = pick(pools[cat]);
  }
  document.querySelector(`[data-cat="${cat}"]`).classList.add('active');
  renderResults();
}

function drawAll() {
  ['kim','kiminle','nerede','nezaman','neyapiyor'].forEach(draw);
}

function resetAll() {
  ['kim','kiminle','nerede','nezaman','neyapiyor'].forEach(c => { state[c] = null; });
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
  renderResults();
}

function renderResults() {
  const chips = document.getElementById('chips');
  const placeholder = document.getElementById('placeholder');
  const sentence = document.getElementById('sentence');
  const keys = ['kim','kiminle','nerede','nezaman','neyapiyor'];
  const filled = keys.filter(k => state[k]);

  if (filled.length === 0) {
    placeholder.style.display = '';
    chips.style.display = 'none';
    sentence.style.display = 'none';
    return;
  }

  placeholder.style.display = 'none';
  chips.style.display = 'flex';

  chips.innerHTML = filled.map((k, i) => {
    const s = state[k];
    return `
      <div class="chip-wrap spin-anim">
        <span class="chip" data-cat="${k}">${s.tr}</span>
        <span class="chip-tr">${s.en}</span>
      </div>
      ${i < filled.length - 1 ? '<span class="sep">·</span>' : ''}
    `;
  }).join('');

  if (filled.length === 5) {
    sentence.style.display = 'block';
    const tr = `<span class="sc-kim">${state.kim.tr}</span>, <span class="sc-kiminle">${state.kiminle.tr}</span> <span class="sc-nerede">${state.nerede.tr}</span> <span class="sc-nezaman">${state.nezaman.tr}</span> <span class="sc-neyapiyor">${state.neyapiyor.tr}</span>.`;
    const en = `<span class="se-kim">${state.kim.en}</span> <span class="se-neyapiyor">${state.neyapiyor.en}</span> <span class="se-kiminle">${state.kiminle.en}</span> <span class="se-nerede">${state.nerede.en}</span> <span class="se-nezaman">${state.nezaman.en}</span>.`;
    sentence.innerHTML = `<div>${tr}</div><div class="sentence-en">${en}</div>`;
  } else {
    sentence.style.display = 'none';
  }
}
